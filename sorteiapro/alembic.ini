[alembic]
# Alembic usa a URL síncrona (psycopg2) para rodar migrations
script_location = alembic

# A URL real é lida pelo env.py via python-dotenv
# Este valor é o fallback se a variável de ambiente não estiver definida
sqlalchemy.url = postgresql://user:password@localhost:5432/sorteiapro

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
